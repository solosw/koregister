<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>账户可视化工具</title>
    <style>
      :root {
        --bg: #f2ede5;
        --panel: rgba(255, 252, 247, 0.88);
        --panel-strong: #fffaf2;
        --ink: #1f2933;
        --ink-soft: #5b6470;
        --line: rgba(31, 41, 51, 0.12);
        --accent: #c35f33;
        --accent-strong: #8f3f1e;
        --accent-soft: rgba(195, 95, 51, 0.12);
        --olive: #6d7c49;
        --shadow: 0 18px 45px rgba(76, 54, 36, 0.14);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Avenir Next",
          "PingFang SC",
          "Hiragino Sans GB",
          "Segoe UI",
          sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(210, 165, 104, 0.42), transparent 30%),
          radial-gradient(circle at 85% 15%, rgba(109, 124, 73, 0.18), transparent 24%),
          linear-gradient(135deg, #efe7d8 0%, #f5f0e8 45%, #ece4d7 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        pointer-events: none;
        z-index: 0;
        border-radius: 999px;
        filter: blur(0.4px);
      }

      body::before {
        width: 280px;
        height: 280px;
        left: -80px;
        bottom: 12%;
        background: radial-gradient(circle, rgba(143, 63, 30, 0.18), transparent 70%);
      }

      body::after {
        width: 360px;
        height: 360px;
        right: -120px;
        top: 15%;
        background: radial-gradient(circle, rgba(109, 124, 73, 0.14), transparent 72%);
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(1320px, calc(100% - 32px));
        margin: 24px auto 40px;
      }

      .hero {
        overflow: hidden;
        position: relative;
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.52);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(140deg, rgba(255, 250, 242, 0.94), rgba(250, 244, 234, 0.74)),
          linear-gradient(45deg, rgba(195, 95, 51, 0.06), transparent 50%);
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -80px;
        top: -40px;
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, rgba(195, 95, 51, 0.18), transparent 68%);
        transform: rotate(12deg);
      }

      .hero-title {
        margin: 0;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 0.96;
        letter-spacing: -0.04em;
        max-width: 8ch;
      }

      .hero-subtitle {
        margin: 18px 0 0;
        max-width: 760px;
        color: var(--ink-soft);
        font-size: 15px;
        line-height: 1.7;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1px solid rgba(31, 41, 51, 0.08);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        backdrop-filter: blur(12px);
        color: var(--ink-soft);
        font-size: 13px;
      }

      .layout {
        display: grid;
        grid-template-columns: 400px minmax(0, 1fr);
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.52);
        border-radius: var(--radius-xl);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .editor-panel {
        padding: 22px;
        align-self: start;
        position: sticky;
        top: 20px;
      }

      .panel-title {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.03em;
      }

      .panel-note {
        margin: 8px 0 0;
        color: var(--ink-soft);
        font-size: 13px;
        line-height: 1.6;
      }

      .editor {
        width: 100%;
        min-height: 460px;
        margin-top: 18px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: rgba(250, 245, 237, 0.92);
        color: var(--ink);
        font: 13px/1.6 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        resize: vertical;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        cursor: pointer;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          background 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #fffdf8;
        box-shadow: 0 12px 20px rgba(143, 63, 30, 0.22);
      }

      .secondary {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        color: var(--ink);
      }

      .ghost {
        background: rgba(195, 95, 51, 0.08);
        color: var(--accent-strong);
      }

      .danger {
        background: rgba(168, 58, 42, 0.1);
        border: 1px solid rgba(168, 58, 42, 0.18);
        color: #8a3426;
      }

      .workspace {
        padding: 22px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) repeat(3, minmax(0, 0.7fr));
        gap: 12px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field label {
        font-size: 12px;
        color: var(--ink-soft);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .field input,
      .field select {
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.76);
        padding: 0 14px;
        color: var(--ink);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .stat {
        position: relative;
        overflow: hidden;
        padding: 18px;
        border: 1px solid rgba(31, 41, 51, 0.08);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(248, 241, 231, 0.88));
      }

      .stat::after {
        content: "";
        position: absolute;
        right: -28px;
        bottom: -30px;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(195, 95, 51, 0.12), transparent 70%);
      }

      .stat-label {
        color: var(--ink-soft);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .stat-value {
        margin-top: 10px;
        font-size: clamp(28px, 4vw, 42px);
        letter-spacing: -0.04em;
      }

      .section {
        margin-top: 22px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-title {
        margin: 0;
        font-size: 18px;
      }

      .section-caption {
        color: var(--ink-soft);
        font-size: 13px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        padding: 18px;
        border: 1px solid rgba(31, 41, 51, 0.08);
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(249, 242, 232, 0.94)),
          linear-gradient(120deg, rgba(109, 124, 73, 0.06), transparent);
        min-height: 240px;
      }

      .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .card-top-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
      }

      .email {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
        word-break: break-word;
      }

      .domain-badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(109, 124, 73, 0.12);
        color: var(--olive);
        font-size: 12px;
        white-space: nowrap;
      }

      .card-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 18px;
      }

      .item {
        border-top: 1px solid rgba(31, 41, 51, 0.08);
        padding-top: 12px;
      }

      .item-label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .item-value {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }

      .value-text {
        flex: 1;
        min-width: 0;
        word-break: break-all;
        font-size: 14px;
        line-height: 1.55;
      }

      .token-preview {
        display: inline-flex;
        max-height: 96px;
        overflow: auto;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(252, 248, 240, 0.95);
        border: 1px solid rgba(31, 41, 51, 0.08);
        font: 12px/1.55 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .mini {
        padding: 8px 11px;
        border-radius: 12px;
        font-size: 12px;
        white-space: nowrap;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid rgba(31, 41, 51, 0.08);
        border-radius: 22px;
        background: rgba(255, 252, 247, 0.86);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 960px;
      }

      thead th {
        position: sticky;
        top: 0;
        background: rgba(248, 240, 230, 0.98);
        backdrop-filter: blur(10px);
        text-align: left;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(31, 41, 51, 0.08);
        vertical-align: top;
      }

      tbody tr:hover {
        background: rgba(195, 95, 51, 0.05);
      }

      .mono {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.6;
        word-break: break-all;
      }

      .table-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .empty {
        padding: 32px 20px;
        border: 1px dashed rgba(31, 41, 51, 0.16);
        border-radius: 22px;
        text-align: center;
        color: var(--ink-soft);
        background: rgba(255, 255, 255, 0.4);
      }

      .footnote {
        margin-top: 16px;
        color: var(--ink-soft);
        font-size: 12px;
        line-height: 1.7;
      }

      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        max-width: min(420px, calc(100% - 24px));
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(31, 41, 51, 0.92);
        color: #fffdf8;
        box-shadow: 0 16px 30px rgba(31, 41, 51, 0.28);
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 1120px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .editor-panel {
          position: static;
        }

        .toolbar,
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .cards {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 20px, 1320px);
          margin-top: 12px;
        }

        .hero,
        .editor-panel,
        .workspace {
          padding: 18px;
          border-radius: 22px;
        }

        .hero-title {
          max-width: none;
        }

        .toolbar,
        .stats {
          grid-template-columns: 1fr;
        }

        .editor {
          min-height: 280px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <h1 class="hero-title">账户可视化工具</h1>
        <p class="hero-subtitle">
          把 `邮箱----密码----机器码----Token` 这类原始文本直接转成可筛选、可复制、可导出的页面。
          数据仅在当前浏览器本地处理，不会自动上传。
        </p>
        <div class="hero-meta">
          <span class="pill">本地单文件 HTML</span>
          <span class="pill">自动解析 4 段结构</span>
          <span class="pill">支持搜索 / 导出 / 复制 / 删除</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel editor-panel">
          <h2 class="panel-title">原始数据</h2>
          <p class="panel-note">
            每行一条记录，默认按 `----` 切分为邮箱、密码、机器码、Token。
          </p>
          <textarea id="rawInput" class="editor" spellcheck="false"></textarea>
          <div class="button-row">
            <button id="parseBtn" class="primary">重新解析</button>
            <button id="loadSampleBtn" class="secondary">恢复示例</button>
            <button id="clearBtn" class="ghost">清空</button>
          </div>
          <p class="footnote">
            如果后续格式有变化，只要前 3 段固定，剩余内容会全部并入 Token 字段。
          </p>
        </section>

        <section class="panel workspace">
          <div class="toolbar">
            <div class="field">
              <label for="searchInput">搜索</label>
              <input
                id="searchInput"
                type="search"
                placeholder="搜索邮箱、密码、机器码或 Token 片段"
              />
            </div>
            <div class="field">
              <label for="domainFilter">域名</label>
              <select id="domainFilter">
                <option value="">全部域名</option>
              </select>
            </div>
            <div class="field">
              <label for="sortBy">排序</label>
              <select id="sortBy">
                <option value="email-asc">邮箱 A → Z</option>
                <option value="email-desc">邮箱 Z → A</option>
                <option value="token-desc">Token 长度高 → 低</option>
                <option value="token-asc">Token 长度低 → 高</option>
              </select>
            </div>
            <div class="field">
              <label for="tokenMode">Token 显示</label>
              <select id="tokenMode">
                <option value="masked">默认隐藏</option>
                <option value="full">完整显示</option>
              </select>
            </div>
          </div>

          <section class="stats" id="stats"></section>

          <section class="section">
            <div class="section-header">
              <div>
                <h3 class="section-title">卡片视图</h3>
                <div class="section-caption" id="resultCaption">0 条记录</div>
              </div>
              <div class="button-row" style="margin-top: 0">
                <button id="exportFormattedBtn" class="secondary">导出指定格式</button>
                <button id="exportJsonBtn" class="secondary">导出 JSON</button>
                <button id="exportCsvBtn" class="secondary">导出 CSV</button>
              </div>
            </div>
            <div id="cardContainer" class="cards"></div>
          </section>

          <section class="section">
            <div class="section-header">
              <div>
                <h3 class="section-title">表格视图</h3>
                <div class="section-caption">适合批量查看和精确复制字段</div>
              </div>
            </div>
            <div id="tableArea"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script>
      const seedData = ``;

      const STORAGE_KEY = "account-visualizer:last-source-text:v1";

      const state = {
        sourceText: seedData,
        records: [],
        filteredRecords: []
      };

      const refs = {
        rawInput: document.getElementById("rawInput"),
        parseBtn: document.getElementById("parseBtn"),
        loadSampleBtn: document.getElementById("loadSampleBtn"),
        clearBtn: document.getElementById("clearBtn"),
        searchInput: document.getElementById("searchInput"),
        domainFilter: document.getElementById("domainFilter"),
        sortBy: document.getElementById("sortBy"),
        tokenMode: document.getElementById("tokenMode"),
        stats: document.getElementById("stats"),
        cardContainer: document.getElementById("cardContainer"),
        tableArea: document.getElementById("tableArea"),
        resultCaption: document.getElementById("resultCaption"),
        exportFormattedBtn: document.getElementById("exportFormattedBtn"),
        exportJsonBtn: document.getElementById("exportJsonBtn"),
        exportCsvBtn: document.getElementById("exportCsvBtn"),
        toast: document.getElementById("toast")
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function loadCachedSource() {
        try {
          return window.localStorage.getItem(STORAGE_KEY);
        } catch (error) {
          console.error("读取本地缓存失败:", error);
          return null;
        }
      }

      function saveCachedSource(rawText) {
        try {
          window.localStorage.setItem(STORAGE_KEY, rawText);
        } catch (error) {
          console.error("写入本地缓存失败:", error);
        }
      }

      function parseRecords(rawText) {
        return rawText
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line, index) => {
            const segments = line.split("----");

            if (segments.length < 4) {
              return {
                id: `invalid-${index}`,
                rawLine: line,
                email: "",
                password: "",
                machineId: "",
                token: "",
                tokenLength: 0,
                domain: "格式异常",
                valid: false
              };
            }

            const [email, password, machineId, ...tokenParts] = segments;
            const token = tokenParts.join("----").trim();

            return {
              id: `${email}-${index}`,
              rawLine: line,
              email: email.trim(),
              password: password.trim(),
              machineId: machineId.trim(),
              token,
              tokenLength: token.length,
              domain: (email.split("@")[1] || "未知域名").toLowerCase(),
              valid: true
            };
          });
      }

      function getMaskText(value, lead = 10, tail = 6) {
        if (!value) return "-";
        if (value.length <= lead + tail) return value;
        return `${value.slice(0, lead)}••••••${value.slice(-tail)}`;
      }

      function getPasswordMask(password) {
        if (!password) return "-";
        if (password.length <= 2) return "•".repeat(password.length);
        return `${password[0]}${"•".repeat(Math.max(password.length - 2, 1))}${password.at(-1)}`;
      }

      function sortRecords(records, sortBy) {
        const list = [...records];

        list.sort((a, b) => {
          switch (sortBy) {
            case "email-desc":
              return b.email.localeCompare(a.email);
            case "token-desc":
              return b.tokenLength - a.tokenLength || a.email.localeCompare(b.email);
            case "token-asc":
              return a.tokenLength - b.tokenLength || a.email.localeCompare(b.email);
            case "email-asc":
            default:
              return a.email.localeCompare(b.email);
          }
        });

        return list;
      }

      function refreshDomainFilter(records) {
        const currentValue = refs.domainFilter.value;
        const domains = [...new Set(records.map((record) => record.domain))].sort();

        refs.domainFilter.innerHTML = `<option value="">全部域名</option>${domains
          .map((domain) => `<option value="${escapeHtml(domain)}">${escapeHtml(domain)}</option>`)
          .join("")}`;

        if (domains.includes(currentValue)) {
          refs.domainFilter.value = currentValue;
        }
      }

      function computeStats(records, filteredRecords) {
        const uniqueMachineIds = new Set(records.filter((item) => item.machineId).map((item) => item.machineId));
        const validCount = records.filter((item) => item.valid).length;
        const averageTokenLength = records.length
          ? Math.round(records.reduce((sum, item) => sum + item.tokenLength, 0) / records.length)
          : 0;

        return [
          { label: "当前结果", value: filteredRecords.length },
          { label: "有效记录", value: validCount },
          { label: "机器码数", value: uniqueMachineIds.size },
          { label: "平均 Token", value: averageTokenLength }
        ];
      }

      function renderStats() {
        const stats = computeStats(state.records, state.filteredRecords);

        refs.stats.innerHTML = stats
          .map(
            (stat) => `
              <article class="stat">
                <div class="stat-label">${escapeHtml(stat.label)}</div>
                <div class="stat-value">${escapeHtml(stat.value)}</div>
              </article>
            `
          )
          .join("");
      }

      function renderCards() {
        if (!state.filteredRecords.length) {
          refs.cardContainer.innerHTML =
            '<div class="empty">没有匹配结果。可以调整搜索词或重新粘贴原始数据。</div>';
          return;
        }

        const tokenMode = refs.tokenMode.value;

        refs.cardContainer.innerHTML = state.filteredRecords
          .map((record) => {
            const tokenText =
              tokenMode === "full"
                ? escapeHtml(record.token || "-")
                : escapeHtml(getMaskText(record.token, 18, 12));

            return `
              <article class="card">
                <div class="card-top">
                  <div>
                    <h4 class="email">${escapeHtml(record.email || "格式异常记录")}</h4>
                  </div>
                  <div class="card-top-meta">
                    <button class="secondary mini" data-export-formatted="${escapeHtml(record.id)}">导出</button>
                    <button class="secondary mini" data-copy-formatted="${escapeHtml(record.id)}">复制格式</button>
                    <button class="danger mini" data-delete-record="${escapeHtml(record.id)}">删除</button>
                    <span class="domain-badge">${escapeHtml(record.domain)}</span>
                  </div>
                </div>

                <div class="card-grid">
                  <div class="item">
                    <span class="item-label">密码</span>
                    <div class="item-value">
                      <div class="value-text mono">${escapeHtml(getPasswordMask(record.password))}</div>
                      <button class="secondary mini" data-copy="${escapeHtml(record.password)}">复制</button>
                    </div>
                  </div>

                  <div class="item">
                    <span class="item-label">机器码</span>
                    <div class="item-value">
                      <div class="value-text mono">${escapeHtml(record.machineId || "-")}</div>
                      <button class="secondary mini" data-copy="${escapeHtml(record.machineId)}">复制</button>
                    </div>
                  </div>

                  <div class="item">
                    <span class="item-label">Token (${record.tokenLength})</span>
                    <div class="item-value">
                      <div class="token-preview">${tokenText}</div>
                      <button class="secondary mini" data-copy="${escapeHtml(record.token)}">复制</button>
                    </div>
                  </div>

                  <div class="item">
                    <span class="item-label">整行原文</span>
                    <div class="item-value">
                      <div class="token-preview">${escapeHtml(getMaskText(record.rawLine, 26, 14))}</div>
                      <button class="secondary mini" data-copy="${escapeHtml(record.rawLine)}">复制</button>
                    </div>
                  </div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function renderTable() {
        if (!state.filteredRecords.length) {
          refs.tableArea.innerHTML =
            '<div class="empty">表格区暂无数据。先在左侧粘贴数据，再点击“重新解析”。</div>';
          return;
        }

        const tokenMode = refs.tokenMode.value;

        refs.tableArea.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>邮箱</th>
                  <th>密码</th>
                  <th>机器码</th>
                  <th>Token</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                ${state.filteredRecords
                  .map(
                    (record, index) => `
                      <tr>
                        <td>${index + 1}</td>
                        <td>${escapeHtml(record.email)}</td>
                        <td class="mono">${escapeHtml(getPasswordMask(record.password))}</td>
                        <td class="mono">${escapeHtml(record.machineId)}</td>
                        <td class="mono">${
                          tokenMode === "full"
                            ? escapeHtml(record.token)
                            : escapeHtml(getMaskText(record.token, 22, 12))
                        }</td>
                        <td>
                          <div class="table-actions">
                            <button class="secondary mini" data-copy="${escapeHtml(record.email)}">邮箱</button>
                            <button class="secondary mini" data-copy="${escapeHtml(record.password)}">密码</button>
                            <button class="secondary mini" data-copy="${escapeHtml(record.machineId)}">机器码</button>
                            <button class="secondary mini" data-copy="${escapeHtml(record.token)}">Token</button>
                            <button class="secondary mini" data-copy-formatted="${escapeHtml(record.id)}">固定格式</button>
                            <button class="danger mini" data-delete-record="${escapeHtml(record.id)}">删除</button>
                          </div>
                        </td>
                      </tr>
                    `
                  )
                  .join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function applyFilters() {
        const query = refs.searchInput.value.trim().toLowerCase();
        const domain = refs.domainFilter.value;
        const sortBy = refs.sortBy.value;

        const filtered = state.records.filter((record) => {
          const matchesDomain = !domain || record.domain === domain;
          const matchesQuery =
            !query ||
            [record.email, record.password, record.machineId, record.token, record.rawLine]
              .join(" ")
              .toLowerCase()
              .includes(query);

          return matchesDomain && matchesQuery;
        });

        state.filteredRecords = sortRecords(filtered, sortBy);
        refs.resultCaption.textContent = `${state.filteredRecords.length} / ${state.records.length} 条记录`;

        renderStats();
        renderCards();
        renderTable();
      }

      function renderAll() {
        refreshDomainFilter(state.records);
        applyFilters();
      }

      function parseAndRender(rawText, options = {}) {
        state.sourceText = rawText;
        state.records = parseRecords(rawText);
        saveCachedSource(rawText);
        if (!options.preserveText) {
          refs.rawInput.value = rawText;
        }
        renderAll();

        if (options.showToast !== false) {
          showToast(`已解析 ${state.records.length} 条记录`);
        }
      }

      function showToast(message) {
        refs.toast.textContent = message;
        refs.toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => {
          refs.toast.classList.remove("show");
        }, 1800);
      }

      async function copyText(value, successMessage = "已复制到剪贴板") {
        if (!value) {
          showToast("当前字段为空");
          return;
        }

        try {
          await navigator.clipboard.writeText(value);
          showToast(successMessage);
        } catch (error) {
          showToast("复制失败，请检查浏览器权限");
          console.error(error);
        }
      }

      function downloadFile(filename, content, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      function exportJson() {
        const content = JSON.stringify(state.filteredRecords, null, 2);
        downloadFile("accounts-export.json", content, "application/json;charset=utf-8");
        showToast("已导出 JSON");
      }

      function formatRecordForExport(record) {
        return `${record.email}|${record.password}|${record.token}|${record.machineId}`;
      }

      function getSingleExportFilename(record) {
        const baseName = (record.email || record.id || "record")
          .replaceAll(/[^a-zA-Z0-9._-]+/g, "_")
          .replace(/^_+|_+$/g, "");
        return `${baseName || "record"}-formatted.txt`;
      }

      function exportFormatted() {
        const content = state.filteredRecords.map(formatRecordForExport).join("\n");

        downloadFile("accounts-formatted.txt", content, "text/plain;charset=utf-8");
        showToast("已导出指定格式");
      }

      function exportSingleFormatted(recordId) {
        const record = state.filteredRecords.find((item) => item.id === recordId) || state.records.find((item) => item.id === recordId);
        if (!record) {
          showToast("未找到对应记录");
          return;
        }

        downloadFile(
          getSingleExportFilename(record),
          formatRecordForExport(record),
          "text/plain;charset=utf-8"
        );
        showToast(`已导出 ${record.email || "当前记录"}`);
      }

      function copySingleFormatted(recordId) {
        const record = state.filteredRecords.find((item) => item.id === recordId) || state.records.find((item) => item.id === recordId);
        if (!record) {
          showToast("未找到对应记录");
          return;
        }

        copyText(formatRecordForExport(record), "已复制固定格式");
      }

      function syncSourceText(records) {
        const rawText = records.map((record) => record.rawLine).join("\n");
        state.sourceText = rawText;
        refs.rawInput.value = rawText;
        saveCachedSource(rawText);
      }

      function deleteRecord(recordId) {
        const record = state.records.find((item) => item.id === recordId);
        if (!record) {
          showToast("未找到对应记录");
          return;
        }

        const label = record.email || "当前记录";
        const confirmed = window.confirm(`确认删除「${label}」吗？`);
        if (!confirmed) return;

        state.records = state.records.filter((item) => item.id !== recordId);
        syncSourceText(state.records);
        renderAll();
        showToast(`已删除 ${label}`);
      }

      function toCsvCell(value) {
        const escaped = String(value ?? "").replaceAll('"', '""');
        return `"${escaped}"`;
      }

      function exportCsv() {
        const headers = ["email", "password", "machineId", "token", "domain", "tokenLength"];
        const rows = state.filteredRecords.map((record) =>
          [
            record.email,
            record.password,
            record.machineId,
            record.token,
            record.domain,
            record.tokenLength
          ]
            .map(toCsvCell)
            .join(",")
        );

        const content = [headers.join(","), ...rows].join("\n");
        downloadFile("accounts-export.csv", content, "text/csv;charset=utf-8");
        showToast("已导出 CSV");
      }

      refs.parseBtn.addEventListener("click", () => {
        parseAndRender(refs.rawInput.value);
      });

      refs.loadSampleBtn.addEventListener("click", () => {
        refs.searchInput.value = "";
        refs.domainFilter.value = "";
        refs.sortBy.value = "email-asc";
        refs.tokenMode.value = "masked";
        parseAndRender(seedData);
      });

      refs.clearBtn.addEventListener("click", () => {
        refs.rawInput.value = "";
        parseAndRender("", { showToast: false, preserveText: true });
        showToast("已清空");
      });

      refs.searchInput.addEventListener("input", applyFilters);
      refs.domainFilter.addEventListener("change", applyFilters);
      refs.sortBy.addEventListener("change", applyFilters);
      refs.tokenMode.addEventListener("change", applyFilters);
      refs.rawInput.addEventListener("input", () => {
        state.sourceText = refs.rawInput.value;
        saveCachedSource(refs.rawInput.value);
      });
      refs.exportFormattedBtn.addEventListener("click", exportFormatted);
      refs.exportJsonBtn.addEventListener("click", exportJson);
      refs.exportCsvBtn.addEventListener("click", exportCsv);

      document.addEventListener("click", (event) => {
        const exportTarget = event.target.closest("[data-export-formatted]");
        if (exportTarget) {
          exportSingleFormatted(exportTarget.getAttribute("data-export-formatted"));
          return;
        }

        const copyFormattedTarget = event.target.closest("[data-copy-formatted]");
        if (copyFormattedTarget) {
          copySingleFormatted(copyFormattedTarget.getAttribute("data-copy-formatted"));
          return;
        }

        const deleteTarget = event.target.closest("[data-delete-record]");
        if (deleteTarget) {
          deleteRecord(deleteTarget.getAttribute("data-delete-record"));
          return;
        }

        const copyTarget = event.target.closest("[data-copy]");
        if (!copyTarget) return;
        copyText(copyTarget.getAttribute("data-copy"));
      });

      const cachedSource = loadCachedSource();
      const initialSource = cachedSource === null ? seedData : cachedSource;

      parseAndRender(initialSource, { showToast: false });

      if (cachedSource !== null) {
        showToast("已恢复上次数据");
      }
    </script>
  </body>
</html>
